<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>测试文件收纳下载页</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --card: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --line: #e5e7eb;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --danger: #dc2626;
        --doc: #7c3aed;
        --img: #059669;
        --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 30%),
          linear-gradient(180deg, #fbfdff 0%, var(--bg) 100%);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", Arial, sans-serif;
      }

      .page {
        width: min(1320px, calc(100% - 36px));
        margin: 0 auto;
        padding: 36px 0 56px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 20px;
        align-items: center;
        margin-bottom: 22px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 46px);
        letter-spacing: -0.04em;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        line-height: 1.8;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(120px, 1fr));
        gap: 12px;
      }

      .stat {
        min-width: 130px;
        padding: 16px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: var(--shadow);
      }

      .stat strong {
        display: block;
        font-size: 28px;
      }

      .stat span {
        color: var(--muted);
        font-size: 13px;
      }

      .toolbar,
      .section {
        border: 1px solid var(--line);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: var(--shadow);
      }

      .toolbar {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        margin-bottom: 20px;
        padding: 16px;
      }

      .search {
        width: 100%;
        padding: 13px 16px;
        border: 1px solid var(--line);
        border-radius: 14px;
        color: var(--text);
        background: #fff;
        font: inherit;
        outline: none;
      }

      .search:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      }

      .upload-label,
      button,
      .download {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 0;
        border-radius: 14px;
        padding: 10px 14px;
        color: #fff;
        background: var(--primary);
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        transition: 0.18s ease;
      }

      .upload-label:hover,
      button:hover,
      .download:hover {
        background: var(--primary-dark);
        transform: translateY(-1px);
      }

      .ghost {
        color: var(--text);
        background: #eef2ff;
      }

      .ghost:hover {
        color: #fff;
      }

      .danger {
        background: var(--danger);
      }

      .danger:hover {
        background: #b91c1c;
      }

      #fileInput {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
      }

      .hint {
        color: var(--muted);
        font-size: 13px;
        line-height: 1.7;
      }

      .section {
        margin-top: 20px;
        overflow: hidden;
      }

      .section-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 20px 22px;
        border-bottom: 1px solid var(--line);
      }

      .section-title {
        display: flex;
        align-items: baseline;
        gap: 10px;
      }

      .section-title h2 {
        margin: 0;
        font-size: 22px;
      }

      .section-title span {
        color: var(--muted);
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 16px;
        padding: 18px;
      }

      .card {
        display: flex;
        min-height: 320px;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--card);
      }

      .preview {
        position: relative;
        display: grid;
        height: 150px;
        place-items: center;
        overflow: hidden;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(135deg, #f3f4f6, #e5e7eb);
      }

      .preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .badge {
        position: absolute;
        top: 10px;
        left: 10px;
        border-radius: 999px;
        padding: 5px 9px;
        color: #fff;
        background: rgba(15, 23, 42, 0.8);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .doc-icon,
      .img-icon {
        display: grid;
        width: 74px;
        height: 92px;
        place-items: center;
        border-radius: 14px;
        color: #fff;
        font-size: 22px;
        font-weight: 900;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.14);
      }

      .doc-icon {
        background: linear-gradient(135deg, var(--doc), #4338ca);
      }

      .img-icon {
        background: linear-gradient(135deg, var(--img), #0d9488);
      }

      .card-body {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 10px;
        padding: 14px;
      }

      .name {
        margin: 0;
        overflow: hidden;
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .meta {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .status {
        width: fit-content;
        border-radius: 999px;
        padding: 4px 8px;
        color: #92400e;
        background: #fef3c7;
        font-size: 12px;
        font-weight: 800;
      }

      .status.ready {
        color: #065f46;
        background: #d1fae5;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: auto;
      }

      .actions .full {
        grid-column: 1 / -1;
      }

      .empty {
        padding: 40px 20px;
        color: var(--muted);
        text-align: center;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: none;
        place-items: center;
        padding: 18px;
        background: rgba(15, 23, 42, 0.48);
      }

      .modal.open {
        display: grid;
      }

      .dialog {
        width: min(420px, 100%);
        border-radius: 22px;
        background: #fff;
        box-shadow: 0 30px 70px rgba(15, 23, 42, 0.28);
        padding: 22px;
      }

      .dialog h3 {
        margin: 0 0 10px;
      }

      .dialog p {
        margin: 0 0 20px;
        color: var(--muted);
        line-height: 1.7;
      }

      .dialog-actions {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 30;
        max-width: min(420px, calc(100% - 36px));
        transform: translateY(18px);
        border-radius: 16px;
        padding: 12px 16px;
        color: #fff;
        background: #111827;
        opacity: 0;
        pointer-events: none;
        transition: 0.2s ease;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      @media (max-width: 760px) {
        .hero,
        .toolbar {
          grid-template-columns: 1fr;
        }

        .stats {
          grid-template-columns: repeat(3, 1fr);
        }

        .stat {
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <div>
          <h1>测试文件收纳下载页</h1>
          <p class="subtitle">
            按扩展名收纳文档与图片，展示压缩预览、大小和下载入口；上传同类型文件时会提示是否覆盖。
          </p>
        </div>
        <div class="stats" aria-label="文件统计">
          <div class="stat"><strong id="totalCount">0</strong><span>总类型</span></div>
          <div class="stat"><strong id="readyCount">0</strong><span>已上传</span></div>
          <div class="stat"><strong id="totalSize">0 B</strong><span>总大小</span></div>
        </div>
      </header>

      <section class="toolbar" aria-label="操作栏">
        <div>
          <input id="searchInput" class="search" type="search" placeholder="搜索扩展名或文件名，例如 pdf / jpg / 测试文档" />
          <div class="hint">支持类型会自动归入“文档”或“图片”。未知扩展名也可上传，会归入“其他文件”。</div>
        </div>
        <div>
          <label class="upload-label" for="fileInput">上传文件/图片</label>
          <input id="fileInput" type="file" multiple />
        </div>
      </section>

      <section class="section">
        <div class="section-head">
          <div class="section-title">
            <h2>文档类型</h2>
            <span id="docSummary"></span>
          </div>
        </div>
        <div id="docGrid" class="grid"></div>
      </section>

      <section class="section">
        <div class="section-head">
          <div class="section-title">
            <h2>图片类型</h2>
            <span id="imageSummary"></span>
          </div>
        </div>
        <div id="imageGrid" class="grid"></div>
      </section>

      <section id="otherSection" class="section" hidden>
        <div class="section-head">
          <div class="section-title">
            <h2>其他文件</h2>
            <span id="otherSummary"></span>
          </div>
        </div>
        <div id="otherGrid" class="grid"></div>
      </section>
    </main>

    <div id="confirmModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
      <div class="dialog">
        <h3 id="confirmTitle">该类型文件已存在，是否需要覆盖</h3>
        <p id="confirmText"></p>
        <div class="dialog-actions">
          <button id="cancelOverwrite" class="ghost" type="button">否</button>
          <button id="confirmOverwrite" type="button">是</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
      const DOCUMENT_TYPES = ["doc", "docx", "ppt", "pptx", "pdf", "xlsx", "xls", "txt", "md"];
      const IMAGE_TYPES = [
        "jpg",
        "jpeg",
        "tif",
        "wbmp",
        "gif",
        "heic",
        "webp",
        "dng",
        "avci",
        "bmp",
        "heif",
        "ico",
        "jpe",
        "cgm",
        "dwg",
        "dxf",
      ];
      const PREVIEWABLE_IMAGE_TYPES = new Set(["jpg", "jpeg", "gif", "webp", "bmp", "ico", "jpe"]);
      const DB_NAME = "test-file-catalog-db";
      const STORE_NAME = "files";
      const DB_VERSION = 1;
      const objectUrlCache = new Map();

      const state = {
        files: {},
        query: "",
        pendingFile: null,
        confirmResolver: null,
      };

      const elements = {
        totalCount: document.querySelector("#totalCount"),
        readyCount: document.querySelector("#readyCount"),
        totalSize: document.querySelector("#totalSize"),
        searchInput: document.querySelector("#searchInput"),
        fileInput: document.querySelector("#fileInput"),
        docGrid: document.querySelector("#docGrid"),
        imageGrid: document.querySelector("#imageGrid"),
        otherGrid: document.querySelector("#otherGrid"),
        otherSection: document.querySelector("#otherSection"),
        docSummary: document.querySelector("#docSummary"),
        imageSummary: document.querySelector("#imageSummary"),
        otherSummary: document.querySelector("#otherSummary"),
        modal: document.querySelector("#confirmModal"),
        confirmText: document.querySelector("#confirmText"),
        confirmOverwrite: document.querySelector("#confirmOverwrite"),
        cancelOverwrite: document.querySelector("#cancelOverwrite"),
        toast: document.querySelector("#toast"),
      };

      elements.searchInput.addEventListener("input", (event) => {
        state.query = event.target.value.trim().toLowerCase();
        render();
      });

      elements.fileInput.addEventListener("change", async (event) => {
        const files = Array.from(event.target.files || []);
        for (const file of files) {
          await handleUpload(file);
        }
        elements.fileInput.value = "";
      });

      elements.confirmOverwrite.addEventListener("click", async () => {
        const resolver = state.confirmResolver;
        closeOverwriteDialog();
        if (resolver) {
          resolver(true);
        }
      });

      elements.cancelOverwrite.addEventListener("click", () => {
        const resolver = state.confirmResolver;
        closeOverwriteDialog();
        if (resolver) {
          resolver(false);
        }
      });

      elements.modal.addEventListener("click", (event) => {
        if (event.target === elements.modal) {
          const resolver = state.confirmResolver;
          closeOverwriteDialog();
          if (resolver) {
            resolver(false);
          }
        }
      });

      init();

      async function init() {
        state.files = await loadFilesFromDB();
        render();
      }

      async function handleUpload(file) {
        const extension = getExtension(file.name);
        if (!extension) {
          showToast(`${file.name} 没有扩展名，无法归类`);
          return;
        }

        if (state.files[extension]) {
          const shouldOverwrite = await askOverwrite(file, extension);
          if (!shouldOverwrite) {
            showToast(`已取消上传 ${file.name}`);
            return;
          }
          await saveUploadedFile(file, true);
          return;
        }

        await saveUploadedFile(file, false);
      }

      function askOverwrite(file, extension) {
        state.pendingFile = file;
        elements.confirmText.textContent = `当前 .${extension} 已有文件“${state.files[extension].name}”，新文件为“${file.name}”。`;
        elements.modal.classList.add("open");
        return new Promise((resolve) => {
          state.confirmResolver = resolve;
        });
      }

      async function saveUploadedFile(file, overwrite) {
        const extension = getExtension(file.name);
        const record = {
          name: file.name,
          extension,
          category: getCategory(extension),
          size: file.size,
          type: file.type || "未知 MIME",
          updatedAt: new Date().toISOString(),
          blob: file,
        };
        revokeObjectUrl(extension);
        state.files[extension] = record;
        await putFileToDB(record);
        render();
        showToast(`${overwrite ? "已覆盖" : "已上传"} .${extension}：${file.name}`);
      }

      function render() {
        const docs = createItems(DOCUMENT_TYPES, "document");
        const images = createItems(IMAGE_TYPES, "image");
        const knownTypes = new Set([...DOCUMENT_TYPES, ...IMAGE_TYPES]);
        const others = Object.values(state.files)
          .filter((file) => !knownTypes.has(file.extension))
          .map((file) => ({ extension: file.extension, category: "other", file }));

        const filteredDocs = filterItems(docs);
        const filteredImages = filterItems(images);
        const filteredOthers = filterItems(others);

        renderGrid(elements.docGrid, filteredDocs);
        renderGrid(elements.imageGrid, filteredImages);
        renderGrid(elements.otherGrid, filteredOthers);
        elements.otherSection.hidden = others.length === 0 && !state.query;

        elements.docSummary.textContent = buildSummary(docs);
        elements.imageSummary.textContent = buildSummary(images);
        elements.otherSummary.textContent = buildSummary(others);

        const allItems = [...docs, ...images, ...others];
        const readyItems = allItems.filter((item) => item.file);
        const totalSize = readyItems.reduce((sum, item) => sum + item.file.size, 0);
        elements.totalCount.textContent = allItems.length;
        elements.readyCount.textContent = readyItems.length;
        elements.totalSize.textContent = formatSize(totalSize);
      }

      function createItems(types, category) {
        return types.map((extension) => ({ extension, category, file: state.files[extension] || null }));
      }

      function filterItems(items) {
        if (!state.query) {
          return items;
        }
        return items.filter((item) => {
          const fileName = item.file?.name || "";
          return item.extension.includes(state.query) || fileName.toLowerCase().includes(state.query);
        });
      }

      function renderGrid(container, items) {
        if (items.length === 0) {
          container.innerHTML = `<div class="empty">没有匹配的文件类型</div>`;
          return;
        }

        container.innerHTML = items.map(renderCard).join("");
        container.querySelectorAll("[data-action='download']").forEach((button) => {
          button.addEventListener("click", () => downloadFile(button.dataset.extension));
        });
        container.querySelectorAll("[data-action='replace']").forEach((button) => {
          button.addEventListener("click", () => triggerReplace(button.dataset.extension));
        });
        container.querySelectorAll("[data-action='remove']").forEach((button) => {
          button.addEventListener("click", () => removeFile(button.dataset.extension));
        });
      }

      function renderCard(item) {
        const { extension, category, file } = item;
        const title = file?.name || `等待上传 .${extension} 文件`;
        const iconClass = category === "image" ? "img-icon" : "doc-icon";
        const iconText = extension.slice(0, 4);
        const canPreviewImage = file && category === "image" && PREVIEWABLE_IMAGE_TYPES.has(extension);
        const preview = canPreviewImage
          ? `<img src="${getObjectUrl(file)}" alt="${escapeHtml(file.name)} 的压缩预览图" loading="lazy" />`
          : `<div class="${iconClass}">${escapeHtml(iconText)}</div>`;
        const statusClass = file ? "status ready" : "status";
        const statusText = file ? "可下载" : "待上传";
        const sizeText = file ? formatSize(file.size) : "0 B";
        const updatedText = file ? formatDate(file.updatedAt) : "暂无";

        return `
          <article class="card">
            <div class="preview">
              ${preview}
              <span class="badge">.${escapeHtml(extension)}</span>
            </div>
            <div class="card-body">
              <p class="name" title="${escapeHtml(title)}">${escapeHtml(title)}</p>
              <div class="meta">
                <span>类型：.${escapeHtml(extension)}</span>
                <span>大小：${sizeText}</span>
                <span>更新时间：${updatedText}</span>
              </div>
              <span class="${statusClass}">${statusText}</span>
              <div class="actions">
                ${
                  file
                    ? `<button data-action="download" data-extension="${extension}" type="button">下载</button>
                       <button class="ghost" data-action="replace" data-extension="${extension}" type="button">替换</button>
                       <button class="danger full" data-action="remove" data-extension="${extension}" type="button">移除</button>`
                    : `<button class="full" data-action="replace" data-extension="${extension}" type="button">上传该类型</button>`
                }
              </div>
            </div>
          </article>`;
      }

      function triggerReplace(extension) {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = `.${extension}`;
        input.addEventListener("change", async (event) => {
          const file = event.target.files?.[0];
          if (!file) {
            return;
          }
          const uploadExtension = getExtension(file.name);
          if (uploadExtension !== extension) {
            showToast(`请选择 .${extension} 类型文件，当前选择的是 .${uploadExtension || "未知"}`);
            return;
          }
          await handleUpload(file);
        });
        input.click();
      }

      function downloadFile(extension) {
        const file = state.files[extension];
        if (!file) {
          showToast(`.${extension} 暂未上传文件`);
          return;
        }
        const link = document.createElement("a");
        link.href = getObjectUrl(file);
        link.download = file.name;
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      async function removeFile(extension) {
        revokeObjectUrl(extension);
        delete state.files[extension];
        await deleteFileFromDB(extension);
        render();
        showToast(`已移除 .${extension} 文件`);
      }

      function closeOverwriteDialog() {
        state.pendingFile = null;
        state.confirmResolver = null;
        elements.modal.classList.remove("open");
      }

      function openDB() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
              db.createObjectStore(STORE_NAME, { keyPath: "extension" });
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function loadFilesFromDB() {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readonly");
          const request = transaction.objectStore(STORE_NAME).getAll();
          request.onsuccess = () => {
            resolve(Object.fromEntries(request.result.map((record) => [record.extension, record])));
          };
          request.onerror = () => reject(request.error);
          transaction.oncomplete = () => db.close();
        });
      }

      async function putFileToDB(record) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readwrite");
          transaction.objectStore(STORE_NAME).put(record);
          transaction.oncomplete = () => {
            db.close();
            resolve();
          };
          transaction.onerror = () => {
            db.close();
            reject(transaction.error);
          };
        });
      }

      async function deleteFileFromDB(extension) {
        const db = await openDB();
        return new Promise((resolve, reject) => {
          const transaction = db.transaction(STORE_NAME, "readwrite");
          transaction.objectStore(STORE_NAME).delete(extension);
          transaction.oncomplete = () => {
            db.close();
            resolve();
          };
          transaction.onerror = () => {
            db.close();
            reject(transaction.error);
          };
        });
      }

      function getObjectUrl(fileRecord) {
        if (!objectUrlCache.has(fileRecord.extension)) {
          objectUrlCache.set(fileRecord.extension, URL.createObjectURL(fileRecord.blob));
        }
        return objectUrlCache.get(fileRecord.extension);
      }

      function revokeObjectUrl(extension) {
        const url = objectUrlCache.get(extension);
        if (url) {
          URL.revokeObjectURL(url);
          objectUrlCache.delete(extension);
        }
      }

      function getExtension(fileName) {
        const parts = fileName.split(".");
        return parts.length > 1 ? parts.pop().toLowerCase() : "";
      }

      function getCategory(extension) {
        if (DOCUMENT_TYPES.includes(extension)) {
          return "document";
        }
        if (IMAGE_TYPES.includes(extension)) {
          return "image";
        }
        return "other";
      }

      function buildSummary(items) {
        const ready = items.filter((item) => item.file).length;
        return `${ready}/${items.length} 个类型已上传`;
      }

      function formatSize(bytes) {
        if (!bytes) {
          return "0 B";
        }
        const units = ["B", "KB", "MB", "GB"];
        const index = Math.min(Math.floor(Math.log(bytes) / Math.log(1024)), units.length - 1);
        const value = bytes / Math.pow(1024, index);
        return `${value.toFixed(value >= 10 || index === 0 ? 0 : 1)} ${units[index]}`;
      }

      function formatDate(dateString) {
        return new Intl.DateTimeFormat("zh-CN", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        }).format(new Date(dateString));
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      let toastTimer;
      function showToast(message) {
        clearTimeout(toastTimer);
        elements.toast.textContent = message;
        elements.toast.classList.add("show");
        toastTimer = setTimeout(() => elements.toast.classList.remove("show"), 3000);
      }
    </script>
  </body>
</html>
